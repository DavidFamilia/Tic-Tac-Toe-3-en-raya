<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Tic Tac Toe</h1>
            <div class="controls">
                <select id="difficulty">
                    <!-- <option value="pvp">Persona vs Persona</option>
                    <option value="easy">Bot: Fácil</option>
                    <option value="medium">Bot: Medio</option> -->
                    <option value="hard">Bot: Difícil</option>
                </select>
            </div>
        </header>

        <main>
            <div class="status" id="status">Esperando jugador...</div>
            <div class="board" id="board">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>
            <button id="reset-btn">Reiniciar Juego</button>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
